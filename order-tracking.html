<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ChopSpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <span class="nav-logo">🍔 ChopSpot</span>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn" onclick="window.location.href='index.html'">🏠</button>
  </div>
</nav>

<div style="padding: 80px 20px 40px;">

  <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:20px;">
    📦 My Orders
  </h2>

  <div id="ordersContainer">
    <div class="skeleton" style="height:120px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:120px;margin-bottom:12px;"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const API = "https://food-app-backend-mhfp.onrender.com";

function getToken() { return localStorage.getItem("chopspot_token"); }
function getUser()  { return JSON.parse(localStorage.getItem("chopspot_user") || "null"); }

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}

const statusSteps = ["pending", "processing", "ready", "delivered"];
const statusLabels = {
  pending:    "⏳ Pending",
  processing: "👨‍🍳 Preparing",
  ready:      "🛵 Ready for Pickup",
  delivered:  "✅ Delivered",
  cancelled:  "❌ Cancelled"
};
const statusColors = {
  pending:    "#f97316",
  processing: "#2563eb",
  ready:      "#7c3aed",
  delivered:  "#16a34a",
  cancelled:  "#dc2626"
};

async function loadMyOrders() {
  const user      = getUser();
  const container = document.getElementById("ordersContainer");

  if (!user) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔐</div>
        <p>Please login to view your orders</p>
        <a href="index.html" class="btn-primary" style="margin-top:16px;text-decoration:none;">Go to Login</a>
      </div>
    `;
    return;
  }

  try {
    const res    = await fetch(`${API}/api/my-orders`, {
      headers: { "Authorization": `Bearer ${getToken()}` }
    });
    const orders = await res.json();

    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <p>No orders yet</p>
          <a href="index.html" class="btn-primary" style="margin-top:16px;text-decoration:none;">Order Now</a>
        </div>
      `;
      return;
    }

    container.innerHTML = orders.map(o => {
      const stepIndex    = statusSteps.indexOf(o.status);
      const isCancelled  = o.status === "cancelled";
      const color        = statusColors[o.status] || "#888";

      return `
        <div class="order-track-card" id="order-${o._id}">
          <div class="otc-header">
            <div>
              <span class="otc-id">#${o._id.slice(-6).toUpperCase()}</span>
              <span class="otc-date">${new Date(o.createdAt).toLocaleDateString()}</span>
            </div>
            <span class="otc-total">₵${o.total}</span>
          </div>

          <div class="otc-items">
            🍔 ${o.items.slice(0,3).map(i => i.name).join(", ")}${o.items.length > 3 ? " ..." : ""}
          </div>

          <div class="otc-location">📍 ${o.location}</div>

          ${isCancelled ? `
            <div class="otc-cancelled">❌ Order Cancelled</div>
          ` : `
            <div class="otc-steps">
              ${statusSteps.map((step, i) => `
                <div class="otc-step ${i <= stepIndex ? "done" : ""} ${i === stepIndex ? "active" : ""}">
                  <div class="otc-dot"></div>
                  <span>${statusLabels[step].split(" ").slice(1).join(" ")}</span>
                </div>
              `).join("")}
            </div>
          `}

          <div class="otc-status" style="background:${color};">
            ${statusLabels[o.status] || o.status}
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    container.innerHTML = `<p class="error-txt">Error loading orders</p>`;
  }
}

// REAL TIME UPDATES
if (typeof io !== "undefined") {
  const socket = io(API);
  socket.on("orderUpdated", (order) => {
    const card = document.getElementById(`order-${order._id}`);
    if (card) {
      showToast(`Order status: ${order.status.toUpperCase()} 📦`);
      loadMyOrders();
    }
  });
}

window.onload = () => {
  const theme = localStorage.getItem("chopspot_theme");
  if (theme === "dark") document.body.classList.add("dark");
  loadMyOrders();
};
</script>

<style>
.order-track-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.otc-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.otc-id    { font-family: var(--font-head); font-weight: 800; font-size: 15px; }
.otc-date  { font-size: 12px; color: var(--text2); margin-left: 8px; }
.otc-total { font-family: var(--font-head); font-weight: 800; color: var(--primary); font-size: 16px; }

.otc-items    { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.otc-location { font-size: 13px; color: var(--text2); margin-bottom: 14px; }

.otc-steps {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  position: relative;
}
.otc-steps::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  height: 2px;
  background: var(--border);
  z-index: 0;
}

.otc-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--text2);
  z-index: 1;
  text-align: center;
  flex: 1;
}
.otc-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--border);
  border: 2px solid var(--border);
  transition: all 0.3s;
}
.otc-step.done .otc-dot  { background: var(--primary); border-color: var(--primary); }
.otc-step.active .otc-dot {
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(22,163,74,0.2);
  animation: ping 1.5s infinite;
}
.otc-step.done span  { color: var(--primary); font-weight: 700; }
.otc-step.active span { color: var(--primary); font-weight: 700; }

@keyframes ping {
  0%,100% { box-shadow: 0 0 0 4px rgba(22,163,74,0.2); }
  50%      { box-shadow: 0 0 0 8px rgba(22,163,74,0.1); }
}

.otc-status {
  color: white;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

.otc-cancelled {
  background: #fee2e2;
  color: #dc2626;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 14px;
}
</style>
</body>
</html>
